<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Dashboard - 실시간 대시보드</title>
    <style>
        /* CSS 변수 - 라이트 테마 */
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --secondary-color: #8b5cf6;
            --accent-color: #06b6d4;
            --background-color: #f8fafc;
            --surface-color: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.1);
            --shadow-heavy: rgba(0, 0, 0, 0.15);
            --gradient-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }

        /* 다크 테마 */
        [data-theme="dark"] {
            --primary-color: #818cf8;
            --primary-dark: #6366f1;
            --secondary-color: #a78bfa;
            --accent-color: #22d3ee;
            --background-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-light: rgba(0, 0, 0, 0.3);
            --shadow-medium: rgba(0, 0, 0, 0.4);
            --shadow-heavy: rgba(0, 0, 0, 0.5);
            --gradient-bg: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            --success-color: #34d399;
            --warning-color: #fbbf24;
            --error-color: #f87171;
        }

        /* 전역 스타일 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient-bg);
            color: var(--text-color);
            min-height: 100vh;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* 헤더 스타일 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--surface-color);
            box-shadow: 0 2px 20px var(--shadow-light);
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }

        .theme-toggle {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .theme-toggle:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 그리드 레이아웃 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 1.5rem;
            min-height: calc(100vh - 140px);
        }

        /* 위젯 카드 공통 스타일 */
        .widget-card {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px var(--shadow-medium);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: grab;
            position: relative;
            overflow: hidden;
        }

        .widget-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow-heavy);
        }

        .widget-card:active {
            cursor: grabbing;
        }

        .widget-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .widget-card:hover::before {
            opacity: 1;
        }

        /* 위젯 헤더 */
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .widget-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .widget-icon {
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        /* 시계 위젯 */
        .clock-widget {
            text-align: center;
        }

        .analog-clock {
            width: 120px;
            height: 120px;
            border: 3px solid var(--border-color);
            border-radius: 50%;
            margin: 0 auto 1rem;
            position: relative;
            background: var(--surface-color);
        }

        .clock-hand {
            position: absolute;
            background: var(--text-color);
            transform-origin: bottom center;
            border-radius: 2px;
        }

        .hour-hand {
            width: 4px;
            height: 30px;
            top: 30px;
            left: 50%;
            margin-left: -2px;
        }

        .minute-hand {
            width: 2px;
            height: 40px;
            top: 20px;
            left: 50%;
            margin-left: -1px;
        }

        .second-hand {
            width: 1px;
            height: 45px;
            top: 15px;
            left: 50%;
            margin-left: -0.5px;
            background: var(--error-color);
        }

        .clock-center {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--text-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .digital-time {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .digital-date {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* Todo 위젯 */
        .todo-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.9rem;
            background: var(--background-color);
            color: var(--text-color);
            margin-bottom: 1rem;
        }

        .todo-filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .filter-btn {
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .todo-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 0.5rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            background: var(--background-color);
            transition: all 0.2s ease;
        }

        .todo-item:hover {
            background: var(--border-color);
        }

        .todo-checkbox {
            margin-right: 0.75rem;
            width: 16px;
            height: 16px;
        }

        .todo-text {
            flex: 1;
            font-size: 0.9rem;
        }

        .todo-delete {
            background: none;
            border: none;
            color: var(--error-color);
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* 날씨 위젯 */
        .weather-current {
            text-align: center;
            margin-bottom: 1rem;
        }

        .weather-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .weather-temp {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .weather-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .weather-detail {
            text-align: center;
            padding: 0.5rem;
            background: var(--background-color);
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .weather-forecast {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .forecast-item {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* 계산기 위젯 */
        .calculator-display {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: right;
            background: var(--background-color);
            color: var(--text-color);
            margin-bottom: 1rem;
            font-family: 'Courier New', monospace;
        }

        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .calc-btn {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--surface-color);
            color: var(--text-color);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .calc-btn:hover {
            background: var(--background-color);
            transform: translateY(-1px);
        }

        .calc-btn.operator {
            background: var(--primary-color);
            color: white;
        }

        .calc-btn.operator:hover {
            background: var(--primary-dark);
        }

        .calc-history {
            margin-top: 1rem;
            max-height: 80px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 메모장 위젯 */
        .memo-controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .memo-btn {
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--surface-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .memo-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .memo-textarea {
            width: 100%;
            height: 150px;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.9rem;
            background: var(--background-color);
            color: var(--text-color);
            resize: none;
            font-family: 'Courier New', monospace;
        }

        .memo-preview {
            height: 150px;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--background-color);
            color: var(--text-color);
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* 차트 위젯 */
        .chart-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .chart-type-select {
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--surface-color);
            color: var(--text-color);
            font-size: 0.8rem;
        }

        .chart-generate-btn {
            padding: 0.25rem 0.75rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chart-generate-btn:hover {
            background: #0891b2;
            transform: translateY(-1px);
        }

        .chart-canvas {
            width: 100%;
            height: 200px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--surface-color);
        }

        /* 반응형 디자인 */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header {
                padding: 1rem;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
                grid-gap: 1rem;
            }

            .widget-card {
                padding: 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .theme-toggle {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }
        }

        /* 드래그 앤 드롭 스타일 */
        .widget-card.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }

        .widget-card.drag-over {
            border: 2px dashed var(--primary-color);
        }

        /* 스크롤바 스타일 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--background-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* 애니메이션 키프레임 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .widget-card {
            animation: fadeIn 0.5s ease-out;
        }

        /* 포커스 스타일 */
        button:focus,
        input:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        /* 로딩 스피너 */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 성공/에러 메시지 */
        .message {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <a href="#" class="logo">🚀 Virtual Dashboard</a>
        <button class="theme-toggle" id="themeToggle">🌙 다크모드</button>
    </header>

    <!-- 메인 컨테이너 -->
    <div class="container">
        <div class="dashboard-grid" id="dashboardGrid">

            <!-- 실시간 시계 위젯 -->
            <div class="widget-card clock-widget" data-widget="clock" draggable="true">
                <div class="widget-header">
                    <h3 class="widget-title">실시간 시계</h3>
                    <span class="widget-icon">🕐</span>
                </div>
                <div class="analog-clock" id="analogClock">
                    <div class="clock-hand hour-hand" id="hourHand"></div>
                    <div class="clock-hand minute-hand" id="minuteHand"></div>
                    <div class="clock-hand second-hand" id="secondHand"></div>
                    <div class="clock-center"></div>
                </div>
                <div class="digital-time" id="digitalTime">00:00:00</div>
                <div class="digital-date" id="digitalDate">2024년 1월 1일</div>
            </div>

            <!-- Todo 관리 위젯 -->
            <div class="widget-card" data-widget="todo" draggable="true">
                <div class="widget-header">
                    <h3 class="widget-title">할 일 관리</h3>
                    <span class="widget-icon">✅</span>
                </div>
                <input type="text" class="todo-input" id="todoInput" placeholder="새로운 할 일을 입력하세요..." maxlength="100">
                <div class="todo-filters">
                    <button class="filter-btn active" data-filter="all">전체</button>
                    <button class="filter-btn" data-filter="active">활성</button>
                    <button class="filter-btn" data-filter="completed">완료</button>
                </div>
                <div class="todo-list" id="todoList">
                    <!-- Todo 항목들이 동적으로 추가됩니다 -->
                </div>
            </div>

            <!-- 날씨 위젯 -->
            <div class="widget-card" data-widget="weather" draggable="true">
                <div class="widget-header">
                    <h3 class="widget-title">날씨 정보</h3>
                    <span class="widget-icon">🌤️</span>
                </div>
                <div class="weather-current">
                    <div class="weather-icon" id="currentWeatherIcon">☀️</div>
                    <div class="weather-temp" id="currentTemp">24°C</div>
                    <div class="weather-desc" id="currentDesc">맑음</div>
                </div>
                <div class="weather-details">
                    <div class="weather-detail">
                        <div>습도</div>
                        <div id="humidity">60%</div>
                    </div>
                    <div class="weather-detail">
                        <div>바람</div>
                        <div id="windSpeed">10km/h</div>
                    </div>
                </div>
                <div class="weather-forecast" id="weatherForecast">
                    <!-- 5일 예보가 동적으로 추가됩니다 -->
                </div>
            </div>

            <!-- 계산기 위젯 -->
            <div class="widget-card" data-widget="calculator" draggable="true">
                <div class="widget-header">
                    <h3 class="widget-title">계산기</h3>
                    <span class="widget-icon">🧮</span>
                </div>
                <input type="text" class="calculator-display" id="calcDisplay" readonly value="0">
                <div class="calculator-buttons">
                    <button class="calc-btn" data-calc="clear">C</button>
                    <button class="calc-btn" data-calc="back">⌫</button>
                    <button class="calc-btn operator" data-calc="/">/</button>
                    <button class="calc-btn operator" data-calc="*">×</button>

                    <button class="calc-btn" data-calc="7">7</button>
                    <button class="calc-btn" data-calc="8">8</button>
                    <button class="calc-btn" data-calc="9">9</button>
                    <button class="calc-btn operator" data-calc="-">-</button>

                    <button class="calc-btn" data-calc="4">4</button>
                    <button class="calc-btn" data-calc="5">5</button>
                    <button class="calc-btn" data-calc="6">6</button>
                    <button class="calc-btn operator" data-calc="+">+</button>

                    <button class="calc-btn" data-calc="1">1</button>
                    <button class="calc-btn" data-calc="2">2</button>
                    <button class="calc-btn" data-calc="3">3</button>
                    <button class="calc-btn operator" data-calc="=" style="grid-row: span 2;">=</button>

                    <button class="calc-btn" data-calc="0" style="grid-column: span 2;">0</button>
                    <button class="calc-btn" data-calc=".">.</button>
                </div>
                <div class="calc-history" id="calcHistory">
                    <!-- 계산 히스토리가 표시됩니다 -->
                </div>
            </div>

            <!-- 메모장 위젯 -->
            <div class="widget-card" data-widget="memo" draggable="true">
                <div class="widget-header">
                    <h3 class="widget-title">메모장</h3>
                    <span class="widget-icon">📝</span>
                </div>
                <div class="memo-controls">
                    <button class="memo-btn active" id="editBtn">편집</button>
                    <button class="memo-btn" id="previewBtn">미리보기</button>
                    <button class="memo-btn" id="saveBtn">저장</button>
                </div>
                <textarea class="memo-textarea" id="memoTextarea" placeholder="마크다운으로 메모를 작성하세요...

# 제목
- 목록 1
- 목록 2

**굵은 글씨** *이탤릭*

`코드` 블록도 지원됩니다."></textarea>
                <div class="memo-preview" id="memoPreview" style="display: none;">
                    <!-- 마크다운 미리보기가 표시됩니다 -->
                </div>
            </div>

            <!-- 차트 위젯 -->
            <div class="widget-card" data-widget="chart" draggable="true">
                <div class="widget-header">
                    <h3 class="widget-title">차트</h3>
                    <span class="widget-icon">📊</span>
                </div>
                <div class="chart-controls">
                    <select class="chart-type-select" id="chartType">
                        <option value="bar">막대 차트</option>
                        <option value="line">선 차트</option>
                    </select>
                    <button class="chart-generate-btn" id="generateChart">데이터 생성</button>
                </div>
                <canvas class="chart-canvas" id="chartCanvas" width="300" height="200"></canvas>
            </div>

        </div>
    </div>

    <script>
        console.log('Virtual Dashboard - JavaScript 기능 구현 시작');

        // ============================================================
        // 1. 실시간 시계 위젯 구현
        // ============================================================
        class ClockWidget {
            constructor() {
                this.hourHand = document.getElementById('hourHand');
                this.minuteHand = document.getElementById('minuteHand');
                this.secondHand = document.getElementById('secondHand');
                this.digitalTime = document.getElementById('digitalTime');
                this.digitalDate = document.getElementById('digitalDate');

                this.init();
            }

            init() {
                this.updateClock();
                // 1초마다 시계 업데이트
                setInterval(() => this.updateClock(), 1000);
            }

            updateClock() {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                // 아날로그 시계 각도 계산
                const secondAngle = (seconds * 6) - 90; // 6도씩 증가 (360/60)
                const minuteAngle = (minutes * 6) + (seconds * 0.1) - 90; // 분침은 초에 따라 부드럽게 이동
                const hourAngle = (hours % 12) * 30 + (minutes * 0.5) - 90; // 시침은 분에 따라 부드럽게 이동

                // 시침/분침/초침 회전 적용
                this.secondHand.style.transform = `rotate(${secondAngle}deg)`;
                this.minuteHand.style.transform = `rotate(${minuteAngle}deg)`;
                this.hourHand.style.transform = `rotate(${hourAngle}deg)`;

                // 디지털 시계 업데이트
                const timeString = now.toLocaleTimeString('ko-KR', { hour12: false });
                this.digitalTime.textContent = timeString;

                // 날짜 업데이트
                const dateString = now.toLocaleDateString('ko-KR', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'long'
                });
                this.digitalDate.textContent = dateString;
            }
        }

        // ============================================================
        // 2. Todo 관리 위젯 구현
        // ============================================================
        class TodoWidget {
            constructor() {
                this.todoInput = document.getElementById('todoInput');
                this.todoList = document.getElementById('todoList');
                this.filterButtons = document.querySelectorAll('.filter-btn');
                this.currentFilter = 'all';
                this.todos = [];

                this.init();
            }

            init() {
                // localStorage에서 할 일 목록 로드
                this.loadTodos();

                // 이벤트 리스너 등록
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.addTodo();
                    }
                });

                this.filterButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setFilter(e.target.getAttribute('data-filter'));
                    });
                });

                // 초기 렌더링
                this.renderTodos();
            }

            addTodo() {
                const text = this.todoInput.value.trim();
                if (!text) return;

                const todo = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date()
                };

                this.todos.push(todo);
                this.todoInput.value = '';
                this.saveTodos();
                this.renderTodos();
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.saveTodos();
                    this.renderTodos();
                }
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(t => t.id !== id);
                this.saveTodos();
                this.renderTodos();
            }

            setFilter(filter) {
                this.currentFilter = filter;

                // 필터 버튼 활성화 상태 변경
                this.filterButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-filter') === filter);
                });

                this.renderTodos();
            }

            getFilteredTodos() {
                switch (this.currentFilter) {
                    case 'active':
                        return this.todos.filter(t => !t.completed);
                    case 'completed':
                        return this.todos.filter(t => t.completed);
                    default:
                        return this.todos;
                }
            }

            renderTodos() {
                const filteredTodos = this.getFilteredTodos();

                this.todoList.innerHTML = '';

                if (filteredTodos.length === 0) {
                    this.todoList.innerHTML = `
                        <div style="text-align: center; color: var(--text-muted); padding: 1rem;">
                            ${this.currentFilter === 'completed' ? '완료된 할 일이 없습니다.' :
                              this.currentFilter === 'active' ? '활성 할 일이 없습니다.' :
                              '할 일이 없습니다.'}
                        </div>
                    `;
                    return;
                }

                filteredTodos.forEach(todo => {
                    const todoElement = document.createElement('div');
                    todoElement.className = 'todo-item';
                    todoElement.innerHTML = `
                        <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}
                               onchange="todoWidget.toggleTodo(${todo.id})">
                        <span class="todo-text" style="${todo.completed ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${todo.text}</span>
                        <button class="todo-delete" onclick="todoWidget.deleteTodo(${todo.id})">🗑️</button>
                    `;
                    this.todoList.appendChild(todoElement);
                });
            }

            saveTodos() {
                localStorage.setItem('dashboard-todos', JSON.stringify(this.todos));
            }

            loadTodos() {
                const saved = localStorage.getItem('dashboard-todos');
                if (saved) {
                    this.todos = JSON.parse(saved);
                } else {
                    // 기본 샘플 할 일
                    this.todos = [
                        { id: 1, text: '대시보드 프로젝트 완성하기', completed: false, createdAt: new Date() },
                        { id: 2, text: 'JavaScript 기능 구현하기', completed: true, createdAt: new Date() }
                    ];
                }
            }
        }

        class WeatherWidget {

                this.currentDesc = document.getElementById('currentDesc');
                this.humidity = document.getElementById('humidity');
                this.windSpeed = document.getElementById('windSpeed');

                this.weatherData = this.generateWeatherData();
                this.currentIndex = 0;

                this.init();
            }

            init() {
                this.updateWeather();

                // 5초마다 다음 날 예보로 자동 전환 (데모용)
                setInterval(() => {
                    this.currentIndex = (this.currentIndex + 1) % this.weatherData.length;
                    this.updateWeather();
                }, 5000);

                // 초기 예보 리스트 렌더링
                this.renderForecast();
            }

            generateWeatherData() {
                const weatherTypes = [
                    { icon: '☀️', desc: '맑음', temp: 25 },
                    { icon: '⛅', desc: '흐림', temp: 22 },
                    { icon: '🌧️', desc: '비', temp: 18 },
                    { icon: '⛈️', desc: '뇌우', temp: 20 },
                    { icon: '❄️', desc: '눈', temp: -2 }
                ];

                const days = ['오늘', '내일', '모레', '4일 후', '5일 후'];

                return days.map((day, index) => {
                    const weather = weatherTypes[index];
                    return {
                        day: day,
                        icon: weather.icon,
                        desc: weather.desc,
                        temp: weather.temp + Math.floor(Math.random() * 10) - 5, // 온도 변화
                        humidity: 50 + Math.floor(Math.random() * 30), // 50-80%
                        windSpeed: 5 + Math.floor(Math.random() * 15) // 5-20km/h
                    };
                });
            }

            updateWeather() {
                const currentWeather = this.weatherData[this.currentIndex];

                // 애니메이션 효과를 위한 페이드 아웃
                this.currentWeatherIcon.style.opacity = '0';
                this.currentTemp.style.opacity = '0';
                this.currentDesc.style.opacity = '0';

                setTimeout(() => {
                    // 현재 날씨 정보 업데이트
                    this.currentWeatherIcon.textContent = currentWeather.icon;
                    this.currentTemp.textContent = `${currentWeather.temp}°C`;
                    this.currentDesc.textContent = `${currentWeather.desc} (${currentWeather.day})`;
                    this.humidity.textContent = `${currentWeather.humidity}%`;
                    this.windSpeed.textContent = `${currentWeather.windSpeed}km/h`;

                    // 페이드 인
                    this.currentWeatherIcon.style.opacity = '1';
                    this.currentTemp.style.opacity = '1';
                    this.currentDesc.style.opacity = '1';
                }, 300);
            }

            renderForecast() {
                this.weatherForecast.innerHTML = '';

                this.weatherData.forEach((weather, index) => {
                    const forecastElement = document.createElement('div');
                    forecastElement.className = 'forecast-item';
                    forecastElement.innerHTML = `
                        <div>${weather.day}</div>
                        <div style="font-size: 1.2rem; margin: 0.25rem 0;">${weather.icon}</div>
                        <div style="color: var(--primary-color); font-weight: 600;">${weather.temp}°C</div>
                        <div>${weather.desc}</div>
                    `;

                    // 현재 선택된 날씨에 하이라이트 효과
                    if (index === this.currentIndex) {
                        forecastElement.style.background = 'var(--primary-color)';

                        forecastElement.style.borderRadius = '8px';

                    this.weatherForecast.appendChild(forecastElement);

                // 다음 업데이트 시 하이라이트 재적용
                setTimeout(() => this.renderForecast(), 5100);
            }
        }

        // ============================================================
        // 4. 계산기 위젯 구현
        // ============================================================
        class CalculatorWidget {
            constructor() {
                this.display = document.getElementById('calcDisplay');
                this.historyContainer = document.getElementById('calcHistory');
                this.buttons = document.querySelectorAll('.calc-btn');

                this.currentInput = '0';
                this.shouldResetDisplay = false;
                this.history = [];

                this.init();
            }

            init() {
                // localStorage에서 히스토리 로드
                this.loadHistory();

                // 버튼 이벤트 등록
                this.buttons.forEach(button => {
                    button.addEventListener('click', () => {
                        const value = button.getAttribute('data-calc');
                        this.handleInput(value);
                    });
                });

                // 키보드 이벤트 등록
                document.addEventListener('keydown', (e) => {
                    this.handleKeyboard(e);
                });

                this.updateDisplay();
                this.renderHistory();
            }

            handleInput(value) {
                switch(value) {
                    case 'clear':
                        this.clear();
                        break;
                    case 'back':
                        this.backspace();
                        break;
                    case '=':
                        this.calculate();
                        break;
                    default:
                        this.appendValue(value);
                        break;
                }
                this.updateDisplay();
            }

            handleKeyboard(e) {
                const key = e.key;

                // 숫자와 연산자
                if (/[0-9+\-*/.()]/.test(key)) {
                    const calcValue = key === '*' ? '*' : key === '/' ? '/' : key;
                    this.appendValue(calcValue);
                    this.updateDisplay();
                }
                // Enter로 계산
                else if (key === 'Enter') {
                    e.preventDefault();
                    this.calculate();
                    this.updateDisplay();
                }
                // Escape로 초기화
                else if (key === 'Escape') {
                    this.clear();
                    this.updateDisplay();
                }
                // Backspace
                else if (key === 'Backspace') {
                    this.backspace();
                    this.updateDisplay();
                }
            }

            appendValue(value) {
                if (this.shouldResetDisplay) {
                    this.currentInput = '';
                    this.shouldResetDisplay = false;
                }

                if (this.currentInput === '0' && /[0-9]/.test(value)) {
                    this.currentInput = value;
                } else {
                    // 연산자 중복 방지
                    const lastChar = this.currentInput.slice(-1);
                    if (/[+\-*/]/.test(value) && /[+\-*/]/.test(lastChar)) {
                        this.currentInput = this.currentInput.slice(0, -1) + value;
                    } else {
                        this.currentInput += value;
                    }
                }
            }

            backspace() {
                if (this.currentInput.length > 1) {
                    this.currentInput = this.currentInput.slice(0, -1);
                } else {
                    this.currentInput = '0';
                }
            }

            clear() {
                this.currentInput = '0';
                this.shouldResetDisplay = false;
            }

            calculate() {
                try {
                    // 안전한 수식 평가 (eval 대신 Function 사용)
                    const expression = this.currentInput.replace(/×/g, '*');

                    // 간단한 수식 검증
                    if (!/^[0-9+\-*/.() ]+$/.test(expression)) {
                        throw new Error('잘못된 수식');
                    }

                    const result = Function(`"use strict"; return (${expression})`)();

                    if (!isFinite(result)) {
                        throw new Error('수학 오류');
                    }

                    // 히스토리에 추가
                    this.addToHistory(`${this.currentInput} = ${result}`);

                    this.currentInput = result.toString();
                    this.shouldResetDisplay = true;

                } catch (error) {
                    this.currentInput = 'Error';
                    this.shouldResetDisplay = true;

                    // 오류 메시지 표시
                    setTimeout(() => {
                        if (this.currentInput === 'Error') {
                            this.currentInput = '0';
                            this.updateDisplay();
                        }
                    }, 1500);
                }
            }

            addToHistory(calculation) {
                this.history.unshift(calculation);

                // 최근 5개만 유지
                if (this.history.length > 5) {
                    this.history = this.history.slice(0, 5);
                }

                this.saveHistory();
                this.renderHistory();
            }

            updateDisplay() {
                this.display.value = this.currentInput;
            }

            renderHistory() {
                if (this.history.length === 0) {
                    this.historyContainer.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 0.5rem;">계산 히스토리가 없습니다</div>';
                    return;
                }

                this.historyContainer.innerHTML = this.history
                    .map(calc => `<div style="padding: 0.25rem; font-family: 'Courier New', monospace;">${calc}</div>`)
                    .join('');
            }

            saveHistory() {
                localStorage.setItem('dashboard-calc-history', JSON.stringify(this.history));
            }

            loadHistory() {
                const saved = localStorage.getItem('dashboard-calc-history');
                if (saved) {
                    this.history = JSON.parse(saved);
                }
            }
        }

        // ============================================================
        // 5. 메모장 위젯 구현
        // ============================================================
        class MemoWidget {
            constructor() {
                this.textarea = document.getElementById('memoTextarea');
                this.preview = document.getElementById('memoPreview');
                this.editBtn = document.getElementById('editBtn');
                this.previewBtn = document.getElementById('previewBtn');
                this.saveBtn = document.getElementById('saveBtn');

                this.currentMode = 'edit';
                this.autoSaveTimer = null;

                this.init();
            }

            init() {
                // localStorage에서 메모 로드
                this.loadMemo();

                // 버튼 이벤트 등록
                this.editBtn.addEventListener('click', () => this.setMode('edit'));
                this.previewBtn.addEventListener('click', () => this.setMode('preview'));
                this.saveBtn.addEventListener('click', () => this.saveMemo());

                // 텍스트 입력 시 자동저장 타이머 설정
                this.textarea.addEventListener('input', () => {
                    this.scheduleAutoSave();
                    if (this.currentMode === 'preview') {
                        this.updatePreview();
                    }
                });

                // 초기 미리보기 업데이트
                this.updatePreview();
            }

            setMode(mode) {
                this.currentMode = mode;

                // 버튼 상태 업데이트
                this.editBtn.classList.toggle('active', mode === 'edit');
                this.previewBtn.classList.toggle('active', mode === 'preview');

                // 뷰 전환
                if (mode === 'edit') {
                    this.textarea.style.display = 'block';
                    this.preview.style.display = 'none';
                    this.textarea.focus();
                } else {
                    this.textarea.style.display = 'none';
                    this.preview.style.display = 'block';
                    this.updatePreview();
                }
            }

            updatePreview() {
                const markdown = this.textarea.value;
                const html = this.parseMarkdown(markdown);
                this.preview.innerHTML = html;
            }

            parseMarkdown(markdown) {
                let html = markdown
                    // 제목 (# ## ###)
                    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                    .replace(/^# (.*$)/gim, '<h1>$1</h1>')

                    // 굵은 글씨 (**text**)
                    .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')

                    // 기울임 (*text*)
                    .replace(/\*(.*)\*/gim, '<em>$1</em>')

                    // 인라인 코드 (`code`)
                    .replace(/`([^`]+)`/gim, '<code style="background: var(--border-color); padding: 2px 4px; border-radius: 3px; font-family: \'Courier New\', monospace;">$1</code>')

                    // 링크 [text](url)
                    .replace(/\[([^\]]+)\]\(([^\)]+)\)/gim, '<a href="$2" style="color: var(--primary-color);">$1</a>')

                    // 리스트 (- item)
                    .replace(/^\- (.+$)/gim, '<li>$1</li>')

                    // 줄바꿈
                    .replace(/\n/gim, '<br>');

                // 리스트 항목들을 ul로 감싸기
                html = html.replace(/(<li>.*?<\/li>)/gims, '<ul style="margin: 0.5rem 0; padding-left: 1.5rem;">$1</ul>');

                // 빈 내용일 때
                if (!html.trim()) {
                    html = '<div style="color: var(--text-muted); font-style: italic;">미리보기할 내용이 없습니다.</div>';
                }

                return html;
            }

            scheduleAutoSave() {
                // 기존 타이머 클리어
                if (this.autoSaveTimer) {
                    clearTimeout(this.autoSaveTimer);
                }

                // 1초 후 자동저장
                this.autoSaveTimer = setTimeout(() => {
                    this.saveMemo();
                }, 1000);
            }

            saveMemo() {
                const content = this.textarea.value;
                localStorage.setItem('dashboard-memo', content);

                // 저장 완료 시각적 피드백
                const originalText = this.saveBtn.textContent;
                this.saveBtn.textContent = '저장됨!';
                this.saveBtn.style.background = 'var(--success-color)';

                setTimeout(() => {
                    this.saveBtn.textContent = originalText;
                    this.saveBtn.style.background = '';
                }, 1000);
            }

            loadMemo() {
                const saved = localStorage.getItem('dashboard-memo');
                if (saved) {
                    this.textarea.value = saved;
                }
            }
        }

        // ============================================================
        // 6. 차트 위젯 구현
        // ============================================================
        class ChartWidget {
            constructor() {
                this.canvas = document.getElementById('chartCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.chartTypeSelect = document.getElementById('chartType');
                this.generateBtn = document.getElementById('generateChart');

                this.data = [];
                this.labels = ['1월', '2월', '3월', '4월', '5월', '6월'];
                this.currentType = 'bar';

                this.init();
            }

            init() {
                // 이벤트 등록
                this.generateBtn.addEventListener('click', () => {
                    this.generateData();
                    this.drawChart();
                });

                this.chartTypeSelect.addEventListener('change', (e) => {
                    this.currentType = e.target.value;
                    this.drawChart();
                });

                // 초기 데이터 생성 및 차트 그리기
                this.generateData();
                this.drawChart();
            }

            generateData() {
                // 랜덤 데이터 생성 (0-100)
                this.data = Array.from({length: 6}, () => Math.floor(Math.random() * 100) + 10);
            }

            drawChart() {
                // 캔버스 클리어
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Canvas 크기 설정
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width * window.devicePixelRatio;
                this.canvas.height = rect.height * window.devicePixelRatio;
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

                const padding = 40;
                const chartWidth = rect.width - padding * 2;
                const chartHeight = rect.height - padding * 2;

                if (this.currentType === 'bar') {
                    this.drawBarChart(padding, chartWidth, chartHeight);
                } else {
                    this.drawLineChart(padding, chartWidth, chartHeight);
                }

                this.drawAxes(padding, rect.width, rect.height);
                this.drawLabels(padding, chartWidth, rect.height);
            }

            drawBarChart(padding, chartWidth, chartHeight) {
                const barWidth = chartWidth / this.data.length * 0.6;
                const barSpacing = chartWidth / this.data.length * 0.4;
                const maxValue = Math.max(...this.data);

                this.data.forEach((value, index) => {
                    const barHeight = (value / maxValue) * chartHeight;
                    const x = padding + index * (chartWidth / this.data.length) + barSpacing / 2;
                    const y = padding + chartHeight - barHeight;

                    // 막대 그리기 (그라디언트)
                    const gradient = this.ctx.createLinearGradient(0, y, 0, y + barHeight);
                    gradient.addColorStop(0, '#6366f1');
                    gradient.addColorStop(1, '#8b5cf6');

                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(x, y, barWidth, barHeight);

                    // 값 표시
                    this.ctx.fillStyle = '#64748b';
                    this.ctx.font = '12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText(value.toString(), x + barWidth / 2, y - 5);
                });
            }

            drawLineChart(padding, chartWidth, chartHeight) {
                const maxValue = Math.max(...this.data);
                const points = [];

                // 점 좌표 계산
                this.data.forEach((value, index) => {
                    const x = padding + (index * chartWidth) / (this.data.length - 1);
                    const y = padding + chartHeight - (value / maxValue) * chartHeight;
                    points.push({x, y, value});
                });

                // 선 그리기
                this.ctx.strokeStyle = '#6366f1';
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();

                points.forEach((point, index) => {
                    if (index === 0) {
                        this.ctx.moveTo(point.x, point.y);
                    } else {
                        this.ctx.lineTo(point.x, point.y);
                    }
                });

                this.ctx.stroke();

                // 점 그리기
                points.forEach(point => {
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.strokeStyle = '#6366f1';
                    this.ctx.lineWidth = 2;

                    this.ctx.beginPath();
                    this.ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.stroke();

                    // 값 표시
                    this.ctx.fillStyle = '#64748b';
                    this.ctx.font = '12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText(point.value.toString(), point.x, point.y - 10);
                });
            }

            drawAxes(padding, width, height) {
                this.ctx.strokeStyle = '#e2e8f0';
                this.ctx.lineWidth = 1;

                // Y축
                this.ctx.beginPath();
                this.ctx.moveTo(padding, padding);
                this.ctx.lineTo(padding, height - padding);
                this.ctx.stroke();

                // X축
                this.ctx.beginPath();
                this.ctx.moveTo(padding, height - padding);
                this.ctx.lineTo(width - padding, height - padding);
                this.ctx.stroke();
            }

            drawLabels(padding, chartWidth, canvasHeight) {
                this.ctx.fillStyle = '#64748b';
                this.ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
                this.ctx.textAlign = 'center';

                // X축 라벨
                this.labels.forEach((label, index) => {
                    const x = padding + (index * chartWidth) / (this.labels.length - 1);
                    this.ctx.fillText(label, x, canvasHeight - padding + 15);
                });
            }
        }

        // ============================================================
        // 7. 드래그 앤 드롭 기능 구현
        // ============================================================
        class DragDropManager {
            constructor() {
                this.draggedElement = null;
                this.placeholder = null;
                this.widgets = [];

                this.init();
            }

            init() {
                // 모든 위젯 요소 가져오기
                this.widgets = Array.from(document.querySelectorAll('[data-widget]'));

                // 저장된 순서 복원
                this.loadWidgetOrder();

                // 각 위젯에 드래그 이벤트 등록
                this.widgets.forEach(widget => {
                    this.setupDragEvents(widget);
                });
            }

            setupDragEvents(widget) {
                widget.addEventListener('dragstart', (e) => {
                    this.draggedElement = widget;
                    widget.classList.add('dragging');

                    // 드래그 데이터 설정
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/html', widget.outerHTML);

                    // 플레이스홀더 생성
                    this.createPlaceholder();
                });

                widget.addEventListener('dragend', () => {
                    if (this.draggedElement) {
                        this.draggedElement.classList.remove('dragging');
                        this.draggedElement = null;
                    }

                    // 플레이스홀더 제거
                    this.removePlaceholder();

                    // 모든 drag-over 클래스 제거
                    this.widgets.forEach(w => w.classList.remove('drag-over'));
                });

                widget.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';

                    if (widget !== this.draggedElement) {
                        widget.classList.add('drag-over');
                    }
                });

                widget.addEventListener('dragleave', () => {
                    widget.classList.remove('drag-over');
                });

                widget.addEventListener('drop', (e) => {
                    e.preventDefault();

                    if (widget !== this.draggedElement && this.draggedElement) {
                        this.swapElements(this.draggedElement, widget);
                        this.saveWidgetOrder();
                    }

                    widget.classList.remove('drag-over');
                });
            }

            createPlaceholder() {
                this.placeholder = document.createElement('div');
                this.placeholder.className = 'widget-placeholder';
                this.placeholder.style.cssText = `
                    background: var(--border-color);
                    border: 2px dashed var(--primary-color);
                    border-radius: 20px;
                    height: 100px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: var(--text-muted);
                    font-size: 0.9rem;
                `;
                this.placeholder.textContent = '여기에 놓기';
            }

            removePlaceholder() {
                if (this.placeholder && this.placeholder.parentNode) {
                    this.placeholder.parentNode.removeChild(this.placeholder);
                }
                this.placeholder = null;
            }

            swapElements(element1, element2) {
                const parent = element1.parentNode;
                const next1 = element1.nextSibling;
                const next2 = element2.nextSibling;

                if (next1 === element2) {
                    parent.insertBefore(element2, element1);
                } else if (next2 === element1) {
                    parent.insertBefore(element1, element2);
                } else {
                    if (next1) {
                        parent.insertBefore(element2, next1);
                    } else {
                        parent.appendChild(element2);
                    }

                    if (next2) {
                        parent.insertBefore(element1, next2);
                    } else {
                        parent.appendChild(element1);
                    }
                }

                // 위젯 배열 업데이트
                this.widgets = Array.from(document.querySelectorAll('[data-widget]'));
            }

            saveWidgetOrder() {
                const order = this.widgets.map(widget => widget.getAttribute('data-widget'));
                localStorage.setItem('dashboard-widget-order', JSON.stringify(order));
            }

            loadWidgetOrder() {
                const saved = localStorage.getItem('dashboard-widget-order');
                if (!saved) return;

                const order = JSON.parse(saved);
                const grid = document.getElementById('dashboardGrid');

                // 저장된 순서대로 위젯 재배열
                order.forEach(widgetType => {
                    const widget = grid.querySelector(`[data-widget="${widgetType}"]`);
                    if (widget) {
                        grid.appendChild(widget);
                    }
                });

                // 위젯 배열 업데이트
                this.widgets = Array.from(document.querySelectorAll('[data-widget]'));
            }
        }

        // ============================================================
        // 테마 토글 및 초기화
        // ============================================================

        // 기본 테마 토글 이벤트
        document.getElementById('themeToggle').addEventListener('click', function() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            body.setAttribute('data-theme', newTheme);
            this.textContent = newTheme === 'dark' ? '☀️ 라이트모드' : '🌙 다크모드';

            // localStorage에 테마 설정 저장
            localStorage.setItem('dashboard-theme', newTheme);
        });

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            // 저장된 테마 적용
            const savedTheme = localStorage.getItem('dashboard-theme') || 'light';
            const themeToggle = document.getElementById('themeToggle');

            document.body.setAttribute('data-theme', savedTheme);
            themeToggle.textContent = savedTheme === 'dark' ? '☀️ 라이트모드' : '🌙 다크모드';

            // 위젯 인스턴스 생성 및 전역 변수로 등록
            window.clockWidget = new ClockWidget();
            window.todoWidget = new TodoWidget();
            window.weatherWidget = new WeatherWidget();
            window.calculatorWidget = new CalculatorWidget();
            window.memoWidget = new MemoWidget();
            window.chartWidget = new ChartWidget();
            window.dragDropManager = new DragDropManager();

            console.log('Virtual Dashboard - 모든 위젯 초기화 완료 (시계, Todo, 날씨, 계산기, 메모장, 차트, 드래그앤드롭)');
        });

        // CSS 트랜지션을 JavaScript에서 추가 적용
        const style = document.createElement('style');
        style.textContent = `
            .weather-icon, .weather-temp, .weather-desc {
                transition: opacity 0.3s ease-in-out !important;
            }

            .forecast-item {
                transition: all 0.3s ease !important;
                cursor: pointer;
            }

            .forecast-item:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 8px var(--shadow-medium);
            }

            .todo-item {
                animation: slideIn 0.3s ease-out;
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateX(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            .clock-hand {
                transition: transform 0.5s ease-in-out;
            }

            .todo-checkbox:checked + .todo-text {
                transition: all 0.3s ease;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
